<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wibuzone Apparel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#050505;
  color:white;
}

/* CART */
.cart{
  position:fixed;
  top:15px;
  right:15px;
  background:#111;
  border:1px solid #222;
  padding:8px 12px;
  border-radius:10px;
  font-size:13px;
}

/* HEADER */
.header{text-align:center;padding:20px;}
.header h1{font-size:30px;font-weight:800;}
.header p{font-size:13px;color:#aaa;}

/* SLIDER */
.product-slider{
  position:relative;
  overflow:hidden;
  max-width:340px;
  margin:auto;
}

.slides{
  display:flex;
  transition:0.45s cubic-bezier(.68,-0.55,.27,1.55);
}

.slides img{
  width:100%;
  flex-shrink:0;
}

/* BADGE FIX */
.badge{
  position:absolute;
  top:12px;
  left:12px;
  background:linear-gradient(45deg,#ff0000,#ff6600);
  color:white;
  padding:8px 12px;
  font-size:12px;
  border-radius:10px;
  font-weight:700;
  z-index:999;
  box-shadow:0 8px 20px rgba(0,0,0,0.6);
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* DOT */
.dots{
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:6px;
}
.dot{
  width:8px;
  height:8px;
  background:#777;
  border-radius:50%;
}
.dot.active{
  background:#fff;
  transform:scale(1.2);
}

/* CARD */
.card{
  margin:15px;
  padding:20px;
  background:rgba(255,255,255,0.03);
  border-radius:16px;
}

/* VIEWER */
.viewer{
  font-size:13px;
  color:#ffaa00;
  margin-bottom:8px;
}

.price{font-size:26px;font-weight:600;}
.stock{color:#00ffaa;}
.timer{color:#ff5555;}

.desc{color:#ccc;margin-top:10px;}

/* BUTTON */
button{
  margin:5px;
  padding:10px;
  border-radius:8px;
  background:#111;
  border:1px solid #222;
  color:white;
}
button.active{
  background:#ff6600;
  border:none;
}

.btn{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="cart">🛒<span id="cart">0</span></div>

<div class="header">
  <h1>WIBUZONE APPAREL</h1>
  <p>Where Passion Meets Innovation</p>
</div>

<!-- SLIDER -->
<div class="product-slider" id="slider">
  <div class="badge">🔥 LIMITED EDITION</div>

  <div class="slides" id="slides">
    <img src="https://i.ibb.co.com/Xfq9LFyd/putih-dan-cokelat-modern-simple-promosi-hoodie-pria-konten-instagram-20260330-174634-0000.png">
    <img src="https://i.ibb.co.com/cSWf64ZR/putih-dan-cokelat-modern-simple-promosi-hoodie-pria-konten-instagram-20260330-214024-0000.png">
  </div>

  <div class="dots">
    <span class="dot active"></span>
    <span class="dot"></span>
  </div>
</div>

<!-- CARD -->
<div class="card">

<div class="viewer">
👀 <span id="viewCount">12</span> orang sedang melihat produk ini
</div>

<p>Pilih Variant:</p>
<button onclick="setVariant('reguler', this)" class="active">Reguler</button>
<button onclick="setVariant('limited', this)">Limited</button>

<div class="price" id="price">$11.9 (~Rp185.000)</div>
<div class="stock">Stock: <span id="stock">7</span></div>
<div class="timer">Diskon: <span id="countdown"></span></div>

<div class="desc" id="desc">
Crewneck Reguler<br>
🌟 Bordir depan saja<br>
🌟 Fleece 400 GSM
</div>

<p>Pilih Size:</p>
<button onclick="pick(this)">M</button>
<button onclick="pick(this)">L</button>
<button onclick="pick(this)">XL</button>

<button class="btn" onclick="addCart()">Tambah ke Keranjang</button>
<button class="btn" onclick="buy()">Beli Sekarang</button>

</div>

<script>

// FIX ELEMENT
let cartEl = document.getElementById("cart");

// SLIDER
let index = 0;
let slides = document.getElementById("slides");
let dots = document.querySelectorAll(".dot");

function updateSlide(){
  slides.style.transform = "translateX(-" + (index * 100) + "%)";
  dots.forEach(d=>d.classList.remove("active"));
  dots[index].classList.add("active");
}

setInterval(()=>{
  index = (index + 1) % 2;
  updateSlide();
},4000);

// SWIPE
let startX = 0;
document.getElementById("slider").addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});
document.getElementById("slider").addEventListener("touchend", e=>{
  let diff = startX - e.changedTouches[0].clientX;
  if(diff > 50) index = (index + 1) % 2;
  else if(diff < -50) index = (index - 1 + 2) % 2;
  updateSlide();
});

// SIZE
function pick(el){
  document.querySelectorAll('.size button, .card button')
    .forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

// VARIANT
let variant = "reguler";
function setVariant(type, el){
  variant = type;

  document.querySelectorAll('.card button')
    .forEach(b=>b.classList.remove('active'));
  el.classList.add('active');

  if(type === "reguler"){
    price.innerText = "$11.9 (~Rp185.000)";
    desc.innerHTML = "Crewneck Reguler<br>🌟 Bordir depan<br>🌟 Fleece 400 GSM";
  } else {
    price.innerText = "$15.27 (~Rp260.000)";
    desc.innerHTML = "Limited Edition 🔥<br>🌟 Bordir depan + lengan<br>🌟 Premium";
  }
}

// CART
let cart=0, stock=8;
function addCart(){
  if(stock<=0) return alert("Habis!");
  cart++; stock--;
  cartEl.innerText=cart;
  document.getElementById("stock").innerText=stock;
}

// BUY
function buy(){
  let size = document.querySelector('.size button.active');
  if(!size) return alert("Pilih size!");
  window.open("https://wa.me/6281284760551?text="+encodeURIComponent("Order "+variant+" size "+size.innerText));
}

// COUNTDOWN
let end = new Date().getTime() + (3*24*60*60*1000);
setInterval(()=>{
  let d=end-new Date().getTime();
  let h=Math.floor(d/1000/60/60);
  document.getElementById("countdown").innerText=h+" jam";
},1000);

// VIEWER
setInterval(()=>{
  document.getElementById("viewCount").innerText = Math.floor(Math.random()*10)+8;
},3000);

</script>

</body>
</html>
