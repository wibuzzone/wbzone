<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Wibuzone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  background:#0a0a0a;
  color:white;
  font-family:'Poppins',sans-serif;
  padding:20px;
}

.container{max-width:420px;margin:auto;}

.card{
  background:#111;
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  animation:fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  background:linear-gradient(45deg,#ff6600,#ff0000);
  font-weight:bold;
}

.total{
  font-size:20px;
  font-weight:700;
  margin-top:10px;
}

.qr-box{
  display:none;
  text-align:center;
  margin-top:15px;
}

.qr-box img{
  width:200px;
  border-radius:12px;
}

.invoice{
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Produk</h3>

<img src="https://i.ibb.co.com/Xfq9LFyd/putih-dan-cokelat-modern-simple-promosi-hoodie-pria-konten-instagram-20260330-174634-0000.png">
<img src="https://i.ibb.co.com/cSWf64ZR/putih-dan-cokelat-modern-simple-promosi-hoodie-pria-konten-instagram-20260330-214024-0000.png">

<select id="variant" onchange="updateTotal()">
<option value="185000">Reguler - Rp185.000</option>
<option value="260000">Limited - Rp260.000</option>
</select>

<select id="size">
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

</div>

<div class="card">
<h3>Pengiriman</h3>

<select id="shipping" onchange="updateTotal()">
<option value="15000">JNE - Rp15.000</option>
<option value="18000">J&T - Rp18.000</option>
<option value="20000">SiCepat - Rp20.000</option>
</select>

</div>

<div class="card">
<h3>Pembayaran</h3>

<select id="payment">
<option value="QRIS">QRIS</option>
<option value="DANA">DANA</option>
<option value="OVO">OVO</option>
<option value="GOPAY">GoPay</option>
<option value="BANK">Transfer Bank</option>
</select>

<div class="total" id="total"></div>

<button onclick="pay()">Bayar Sekarang</button>

<div class="qr-box" id="qrBox">
  <h3>Scan & Bayar</h3>
  <img id="qrImg">
  <div class="invoice" id="invoice"></div>

  <button onclick="finish()">Saya Sudah Bayar</button>
</div>

</div>

</div>

<script>

<script>

// ELEMENT
let variant = document.getElementById("variant");
let size = document.getElementById("size");
let shipping = document.getElementById("shipping");
let payment = document.getElementById("payment");
let total = document.getElementById("total");
let qrBox = document.getElementById("qrBox");
let qrImg = document.getElementById("qrImg");
let invoice = document.getElementById("invoice");

// FORMAT
function format(x){
  return "Rp"+x.toLocaleString("id-ID");
}

// AMBIL PARAM URL
let url = new URLSearchParams(window.location.search);
let selectedVariant = url.get("variant");
let selectedSize = url.get("size");

// AUTO FILL
window.onload = function(){

  if(selectedVariant){
    if(selectedVariant === "limited"){
      variant.value = "260000";
    } else {
      variant.value = "185000";
    }
  }

  if(selectedSize){
    size.value = selectedSize;
  }

  updateTotal();
}

// TOTAL
function updateTotal(){
  let v = parseInt(variant.value);
  let s = parseInt(shipping.value);
  total.innerText = "Total: " + format(v+s);
}

// BAYAR
function pay(){

  let metode = payment.value;

  let data = "WIBUZONE-"+metode;

  qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+data;

  qrBox.style.display = "block";

  // invoice
  window.currentInv = "WBZ-"+Math.floor(Math.random()*100000);
  invoice.innerText = "Invoice: " + window.currentInv;
}

// SELESAI
function finish(){

  let inv = window.currentInv;

  if(!inv){
    alert("Klik bayar dulu!");
    return;
  }

  localStorage.setItem(inv,"unpaid");

  window.location.href = "status.html?inv="+inv;
}

</script>
