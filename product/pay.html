<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Wibuzone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  background:#0a0a0a;
  color:white;
  font-family:'Poppins',sans-serif;
  padding:20px;
}

.container{max-width:420px;margin:auto;}

.card{
  background:#111;
  padding:20px;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  animation:fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

button{
  background:linear-gradient(45deg,#ff6600,#ff0000);
  font-weight:bold;
  cursor:pointer;
}

.total{
  font-size:20px;
  font-weight:700;
  margin-top:10px;
}

.qr-box{
  display:none;
  text-align:center;
  margin-top:15px;
  animation:fade 0.5s ease;
}

.qr-box img{
  width:200px;
  border-radius:12px;
}

.invoice{
  margin-top:10px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Produk</h3>

<img src="https://i.ibb.co.com/Xfq9LFyd/putih-dan-cokelat-modern-simple-promosi-hoodie-pria-konten-instagram-20260330-174634-0000.png">
<img src="https://i.ibb.co.com/cSWf64ZR/putih-dan-cokelat-modern-simple-promosi-hoodie-pria-konten-instagram-20260330-214024-0000.png">

<select id="variant">
<option value="185000">Reguler - Rp185.000</option>
<option value="260000">Limited - Rp260.000</option>
</select>

<select id="size">
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

</div>

<div class="card">
<h3>Pengiriman</h3>

<select id="shipping">
<option value="15000">JNE - Rp15.000</option>
<option value="18000">J&T - Rp18.000</option>
<option value="20000">SiCepat - Rp20.000</option>
</select>

</div>

<div class="card">
<h3>Pembayaran</h3>

<select id="payment">
<option value="">Pilih Metode</option>
<option value="QRIS">QRIS</option>
<option value="DANA">DANA</option>
<option value="OVO">OVO</option>
<option value="GOPAY">GoPay</option>
<option value="BANK">Transfer Bank</option>
</select>

<div class="total" id="total"></div>

<button onclick="pay()">Bayar Sekarang</button>

<div class="qr-box" id="qrBox">
  <h3>Scan & Bayar</h3>
  <img id="qrImg">
  <div class="invoice" id="invoice"></div>

  <button onclick="finish()">Saya Sudah Bayar</button>
</div>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const payment = document.getElementById("payment");
const shipping = document.getElementById("shipping");
const variant = document.getElementById("variant");

const qrBox = document.getElementById("qrBox");
const qrImg = document.getElementById("qrImg");
const invoice = document.getElementById("invoice");
const total = document.getElementById("total");

// FORMAT
function format(x){
  return "Rp" + x.toLocaleString("id-ID");
}

// UPDATE TOTAL
function updateTotal(){
  let v = parseInt(variant.value || 0);
  let s = parseInt(shipping.value || 0);
  total.innerText = "Total: " + format(v + s);
}

// EVENT
variant.addEventListener("change", updateTotal);
shipping.addEventListener("change", updateTotal);

updateTotal();

// PAY
window.pay = function(){

  if(!payment.value){
    alert("Pilih metode pembayaran!");
    return;
  }

  let data = "WIBUZONE-" + payment.value;

  qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + data;

  qrBox.style.display = "block";

  window.currentInv = "WBZ-" + Math.floor(Math.random()*999999);

  invoice.innerText = "Invoice: " + window.currentInv;
}

// FINISH
window.finish = function(){

  if(!window.currentInv){
    alert("Klik bayar dulu!");
    return;
  }

  localStorage.setItem(window.currentInv, "unpaid");

  window.location.href = "status.html?inv=" + window.currentInv;
}

});
</script>

</body>
</html>
