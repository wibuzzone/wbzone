<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Order Wibuzone</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  background:#050505;
  color:white;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#111;
  padding:25px;
  border-radius:18px;
  text-align:center;
  width:90%;
  max-width:360px;
  box-shadow:0 15px 40px rgba(0,0,0,0.7);
  animation:fade 0.5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}

.inv{
  font-size:13px;
  color:#aaa;
}

.status{
  font-size:20px;
  margin-top:15px;
  font-weight:600;
}

.badge{
  margin-top:10px;
  font-size:12px;
  padding:6px 10px;
  border-radius:8px;
  display:inline-block;
}

.waiting{
  background:#ffaa00;
  color:#000;
}

.paid{
  background:#00ffcc;
  color:#000;
}

.btn{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  font-weight:bold;
  background:linear-gradient(45deg,#ff6600,#ff0000);
  color:white;
}

.admin-btn{
  background:#00ffcc;
  color:black;
}

.small{
  font-size:12px;
  color:#888;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Status Order</h2>
  <div class="inv" id="inv"></div>

  <div class="status" id="status"></div>
  <div id="badge"></div>

  <button class="btn" onclick="confirmPay()">Saya Sudah Bayar</button>

  <div id="adminArea"></div>

  <div class="small">Wibuzone Apparel ©</div>
</div>

<script>

// AMBIL PARAM URL
let url = new URLSearchParams(window.location.search);
let inv = url.get("inv") || "WBZ-UNKNOWN";
let admin = url.get("admin");

document.getElementById("inv").innerText = inv;

// LOAD STATUS
function loadStatus(){
  let s = localStorage.getItem(inv);

  if(s === "paid"){
    status.innerText = "Pembayaran Berhasil";
    badge.innerHTML = `<div class="badge paid">✔ PAID</div>`;
  } else {
    status.innerText = "Menunggu Pembayaran";
    badge.innerHTML = `<div class="badge waiting">⏳ UNPAID</div>`;
  }
}

loadStatus();

// AUTO REFRESH (biar keliatan hidup)
setInterval(loadStatus,2000);

// USER BUTTON
function confirmPay(){
  alert("Setelah transfer, kirim bukti pembayaran ke admin ya 🙏");
}

// 🔥 ADMIN MODE (HP FRIENDLY)
if(admin === "true"){

  let pass = prompt("Masukkan password admin:");

  if(pass === "wibu123"){

    document.getElementById("adminArea").innerHTML = `
      <button class="btn admin-btn" onclick="setPaid()">✔ Tandai Sudah Dibayar</button>
      <button class="btn" onclick="setUnpaid()">Reset ke UNPAID</button>
    `;

  }

}

// ADMIN ACTION
function setPaid(){
  localStorage.setItem(inv,"paid");
  loadStatus();
}

function setUnpaid(){
  localStorage.setItem(inv,"unpaid");
  loadStatus();
}

</script>

</body>
</html>
